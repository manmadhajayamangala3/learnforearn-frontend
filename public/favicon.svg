<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#9B6ED4"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Sword 1: top-left to bottom-right (blade tip top-left) -->
  <line x1="20" y1="20" x2="80" y2="80" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Sword 1 crossguard -->
  <line x1="24" y1="42" x2="42" y2="24" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Sword 1 handle pommel -->
  <circle cx="74" cy="74" r="4.5" fill="white"/>
  <!-- Sword 2: top-right to bottom-left (blade tip top-right) -->
  <line x1="80" y1="20" x2="20" y2="80" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Sword 2 crossguard -->
  <line x1="76" y1="42" x2="58" y2="24" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Sword 2 handle pommel -->
  <circle cx="26" cy="74" r="4.5" fill="white"/>
</svg>
